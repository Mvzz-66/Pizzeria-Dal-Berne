<!-- index.html -->
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizzeria dal Berne</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="img/Berneschi.png" alt="Pizzeria dal Berne">
  <h1>Pizzeria dal Berne</h1>
</header>

<main class="container">

  <!-- Pizze Classiche -->
  <div class="dropdown">
    <button onclick="toggleMenu('classiche')">Pizze Classiche</button>
      <div class="content" id="classiche">
        <div class="item">
          <h2>Margherita</h2>
          <img src="img/Margherita.png" width="400" height="400" alt="Margherita">
          <br>
        </div>
        <div class="item">
          <h2>Marinara</h2>
          <img src="img/Marinara.png" width="400" height="400" alt="Marinara">
          <br>
        </div>
        <div class="item">
          <h2>Capricciosa</h2>
          <img src="img/Capricciosa.png" width="400" height="400" alt="Capricciosa">
          <br>
        </div>
        <div class="item">
          <h2>Quattro Stagioni</h2>
          <img src="img/QuanttroStagioni.png" width="400" height="400" alt="Quattro Stagioni">
          <br>
      </div>
  </div>
  <!-- Pizze Gourmet -->
  <div class="dropdown">
    <button onclick="toggleMenu('gourmet')">Pizze Gourmet</button>
    <div class="content" id="gourmet">
      <div class="item">
        <img src="img/tartufo.jpg" alt="Tartufo e Funghi">
        <span>Tartufo e Funghi</span>
      </div>
      <div class="item">
        <img src="img/bufala-crudo.jpg" alt="Bufala e Crudo">
        <span>Bufala e Crudo</span>
      </div>
      <div class="item">
        <img src="img/pistacchio.jpg" alt="Pistacchio e Mortadella">
        <span>Pistacchio e Mortadella</span>
      </div>
      <div class="item">
        <img src="img/salmone.jpg" alt="Salmone e Rucola">
        <span>Salmone e Rucola</span>
      </div>
    </div>
  </div>

  <!-- Dolci e Caffé -->
  <div class="dropdown">
    <button onclick="toggleMenu('dolci')">Dolci</button>
    <div class="content" id="dolci">
      <div class="item">
        <img src="img/tiramisu.jpg" alt="Tiramisù">
        <span>Tiramisù</span>
      </div>
      <div class="item">
        <img src="img/pannacotta.jpg" alt="Panna Cotta">
        <span>Panna Cotta</span>
      </div>
      <div class="item">
        <img src="img/cannolo.jpg" alt="Cannolo Siciliano">
        <span>Cannolo Siciliano</span>
      </div>
      <div class="item">
        <img src="img/nutella.jpg" alt="Pizza alla Nutella">
        <span>Pizza alla Nutella</span>
      </div>
    </div>
  </div>

</main>

<script src="script.js"></script>
</html>
